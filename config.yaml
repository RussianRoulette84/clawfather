# Clawfather config — wizard defaults
# Edit below. Run install to apply changes -> it will owerwrite this

models:
  agents:
    general:
      primary: zai/glm-4.7
      fallbacks: []
    light:
      primary: zai/glm-4.7-flash
      fallbacks: []
    heavy:
      primary: zai/glm-4.7
      fallbacks: []

gateway:
  port: 18789
  bind: lan
  bridge_port: 18790

workspace:
  config_dir:             ~/Projects/OpenClaw           # OpenClaw dir on host (config, logs, skills)
  workspace_dir:          ~/Projects/OpenClaw/workspace # Agent working directory on host
  mirror_projects:        true                          # Mount host projects into container; risky if sensitive data
  projects_dir:           ~/Projects/ai                 # Host path to projects (when mirror_projects: true)
  docker_projects_path:   ~/.openclaw/workspace/ai      # Path inside container where projects are mounted
  docker_base:            ~/.openclaw                   # OpenClaw path inside container (config mount target)
  docker_workspace:       ~/.openclaw/workspace         # Workspace path inside container

docker:
  image:                  fourplayers/openclaw:latest  # Gateway image (fourplayers = root, alpine = node)
  user:                   root                         # Container user; root for fourplayers, node for others
  network_mode:           bridge                       # bridge, host, or none (none = offline mode)
  vol_mode:               ""                           # ":ro" when read_only_mounts; "" for read-write
  service_manager:        none                         # ClawFather does not register as system service
  no_service:             true                         # No OpenClaw service manager inside container

security:
  # Enable 'root_mode' when using fourplayers/openclaw image
  root_mode:              true   # Runs container as root so setup/skills work; off = node user, may EACCES
  # ENABLED by default for ClawFather
  safe_mode:              true   # Prevents destructive commands without manual verification; off = can delete/overwrite
  bridge_enabled:         true   # Container can reach host (e.g. Ollama) via host.docker.internal; off = no LLM/bridges
  no_new_privs:           true   # Prevents privilege escalation and sudo exploits; off = standard isolation
  browser_control:        true   # Agent can drive browser (tabs, navigate, snapshot); off = browser disabled
  tools_elevated:         true   # Elevated host exec and high-privilege tools; off = reduced blast radius
  # Extra security
  sandbox_mode:           false  # Restricts file access to workspace only; on = max data safety
  read_only_mounts:       false  # Protects skills folder from agent modification; on = read-only skills
  networking_offline:     false  # Disconnects from external networks (air-gapped); on = max privacy
  paranoid_mode:          false  # Drops all Linux capabilities (cap_drop ALL); on = max isolation
  # Convinience
  hooks_enabled:          true   # Gateway hooks for automation and event handling; off = no hook handlers
  auto_start:             true   # Auto-restart container after reboot; off = manual start each time
  # Danger zone
  god_mode:               false  # Agent gets Docker socket, can manage other containers; on = God Mode

hooks:
  entries: boot-md,bootstrap-extra-files,command-logger,session-memory  # Bundled hooks (Install wizard)
